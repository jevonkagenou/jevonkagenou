name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-pacman.svg?type=pacman&color_snake=FFFF00&color_dots=ebedf0,c084fc,a855f7,7c3aed,4C1D95
            dist/github-pacman-dark.svg?type=pacman&color_snake=FFFF00&color_dots=30363D,6C3CE9,9745F5,BB86FC,E040FB

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
